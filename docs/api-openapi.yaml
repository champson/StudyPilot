# ============================================================
# 组件定义
# ============================================================

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer Token，通过 /auth/token-login 或 /auth/admin-login 获取"

  responses:
    Unauthorized:
      description: 未认证或 Token 无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "UNAUTHORIZED"
              message: "请先登录"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "NOT_FOUND"
              message: "资源不存在"

  schemas:

    # ---------- 通用 ----------

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: 错误码（大写下划线风格）
              example: "ONBOARDING_NOT_COMPLETED"
            message:
              type: string
              description: 人类可读错误信息
              example: "请先完成入学问卷"
            detail:
              type: object
              description: 附加错误细节（可选）

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT Token
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          description: 过期秒数
          example: 2592000
        user:
          type: object
          properties:
            id:
              type: integer
            role:
              type: string
              enum: [student, parent, admin]
            nickname:
              type: string
            student_id:
              type: integer
              nullable: true
              description: 关联学生 ID（parent/student 角色）

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # ---------- 学生档案 ----------

    CreateProfileRequest:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
          enum: [高一, 高二, 高三]
        textbook_version:
          type: string
        subject_combination:
          type: array
          items:
            type: string
          description: 选科组合（如 ["physics", "chemistry", "biology"]）

    UpdateProfileRequest:
      type: object
      properties:
        grade:
          type: string
          enum: [高一, 高二, 高三]
        textbook_version:
          type: string
        subject_combination:
          type: array
          items:
            type: string
        upcoming_exams:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              date:
                type: string
                format: date

    StudentProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        grade:
          type: string
        textbook_version:
          type: string
          nullable: true
        subject_combination:
          type: array
          items:
            type: string
        upcoming_exams:
          type: array
          items:
            type: object
        onboarding_completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OnboardingSubmitRequest:
      type: object
      required: [grade, subject_combination, weak_subjects, daily_study_minutes]
      properties:
        grade:
          type: string
          enum: [高一, 高二, 高三]
        textbook_version:
          type: object
          additionalProperties:
            type: string
          description: 各科教材版本，如 {"math": "人教A版", "physics": "人教版"}
        subject_combination:
          type: array
          items:
            type: string
          description: 选科科目代码列表
        weak_subjects:
          type: array
          items:
            type: string
          maxItems: 3
          description: 自评薄弱学科（最多 3 门）
        recent_exam_scores:
          type: object
          additionalProperties:
            type: number
          description: 最近月考各科成绩（可选），如 {"math": 110, "physics": 72}
        error_types_by_subject:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              enum: [calc_error, concept_unclear, careless, unknown]
          description: 各科常见错误类型自评
        daily_study_minutes:
          type: integer
          minimum: 10
          maximum: 480
          description: 日均课后学习时间（分钟）
        upcoming_exam_date:
          type: string
          format: date
          nullable: true
          description: 近期最重要考试日期（可选）

    # ---------- 计划 ----------

    DailyPlan:
      type: object
      properties:
        id:
          type: integer
        plan_date:
          type: string
          format: date
        learning_mode:
          type: string
          enum: [workday_follow, weekend_review]
        system_recommended_mode:
          type: string
          enum: [workday_follow, weekend_review]
          description: 系统推荐的模式（学生可改选）
        available_minutes:
          type: integer
        source:
          type: string
          enum: [upload_corrected, history_inferred, manual_adjusted, generic_fallback]
          description: 计划来源
        is_history_inferred:
          type: boolean
          description: 是否为历史推断（无新上传时）
        recommended_subjects:
          type: array
          items:
            $ref: "#/components/schemas/RecommendedSubject"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/PlanTask"
        status:
          type: string
          enum: [generated, in_progress, completed]
        warning:
          type: string
          nullable: true
          description: 警告信息（如"连续7天未上传新内容"）
        created_at:
          type: string
          format: date-time

    RecommendedSubject:
      type: object
      properties:
        subject_id:
          type: integer
        subject_name:
          type: string
        reasons:
          type: array
          description: 推荐原因标签，严格枚举（对应 PriorityFactor）
          items:
            type: string
            enum:
              - 今日校内同步
              - 今日错误较多
              - 明日任务/测验
              - 近期反复错误
              - 本周覆盖不足
              - 本周错题修复
              - 薄弱知识点待修复
              - 考试临近
              - 最近成绩下滑

    PlanTask:
      type: object
      properties:
        id:
          type: integer
        plan_id:
          type: integer
        subject_id:
          type: integer
        subject_name:
          type: string
        task_type:
          type: string
          enum: [lecture, practice, error_review, consolidation]
          description: 任务类型（讲解/练习/错题复习/巩固）
        task_content:
          type: object
          description: 任务详情 JSON（知识点、题目列表等）
        sequence:
          type: integer
          description: 任务顺序
        estimated_minutes:
          type: integer
        status:
          type: string
          enum: [pending, entered, executed, completed]
          description: "任务状态。允许从任意状态直接跳到 completed（向前跳跃）；禁止逆向回退（如 completed→entered）。"
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_minutes:
          type: integer
          nullable: true

    # ---------- 上传 ----------

    StudyUpload:
      type: object
      properties:
        id:
          type: integer
        upload_type:
          type: string
          enum: [note, homework, test, handout, score]
        thumbnail_url:
          type: string
          nullable: true
        subject_id:
          type: integer
          nullable: true
        subject_name:
          type: string
          nullable: true
        ocr_status:
          type: string
          enum: [pending, processing, completed, failed]
        is_manual_corrected:
          type: boolean
        original_url:
          type: string
          description: OSS 原始文件 URL（学生只读）
        created_at:
          type: string
          format: date-time

    OcrStatusResponse:
      type: object
      properties:
        upload_id:
          type: integer
        ocr_status:
          type: string
          enum: [pending, processing, completed, failed]
        ocr_result:
          type: object
          nullable: true
          description: OCR 结构化结果（仅 completed 时有值）
          properties:
            extracted_questions:
              type: array
              items:
                type: object
                properties:
                  question_text:
                    type: string
                  latex_expressions:
                    type: array
                    items:
                      type: string
                  question_type:
                    type: string
            subject_detected:
              type: string
            knowledge_points:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  confidence:
                    type: number
        ocr_error:
          type: string
          nullable: true
          description: 失败原因（仅 failed 时有值）

    PaginatedUploads:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/StudyUpload"

    # ---------- 答疑 ----------

    ChatRequest:
      type: object
      required: [message]
      properties:
        session_id:
          type: integer
          nullable: true
          description: 已有会话 ID（续接对话），null 时创建新会话
        message:
          type: string
          description: 用户消息
        attachments:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [image]
              upload_id:
                type: integer
                description: 已上传材料的 ID
        subject_id:
          type: integer
          nullable: true
          description: 当前答疑学科（可选，用于会话关联）

    ChatResponse:
      type: object
      properties:
        session_id:
          type: integer
        message_id:
          type: integer
        role:
          type: string
          example: "assistant"
        content:
          type: string
        knowledge_points:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        tutoring_strategy:
          type: string
          enum: [hint, step_by_step, formula, full_solution]
          description: 答疑策略标注

    QaSession:
      type: object
      properties:
        id:
          type: integer
        session_date:
          type: string
          format: date
        subject_id:
          type: integer
          nullable: true
        subject_name:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, closed]
        message_count:
          type: integer
        created_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true

    QaSessionDetail:
      allOf:
        - $ref: "#/components/schemas/QaSession"
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/QaMessage"

    QaMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        attachments:
          type: array
          items:
            type: object
        intent:
          type: string
          enum: [upload_question, ask, follow_up, chat]
          nullable: true
        knowledge_points:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        tutoring_strategy:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    PaginatedQaSessions:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/QaSession"

    # ---------- 错题本 ----------

    ErrorBookItem:
      type: object
      properties:
        id:
          type: integer
        subject_id:
          type: integer
        subject_name:
          type: string
        question_content:
          type: object
          description: 题目内容（含 LaTeX 表达式）
          properties:
            text:
              type: string
            latex_expressions:
              type: array
              items:
                type: string
        knowledge_points:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        error_type:
          type: string
          enum: [calc_error, concept_unclear, careless, unknown]
          nullable: true
        entry_reason:
          type: string
          enum: [wrong, not_know, repeated_wrong]
        is_explained:
          type: boolean
        is_recalled:
          type: boolean
        last_recall_at:
          type: string
          format: date-time
          nullable: true
        last_recall_result:
          type: string
          enum: [success, fail]
          nullable: true
        recall_count:
          type: integer
        created_at:
          type: string
          format: date-time

    ErrorSummary:
      type: object
      properties:
        total:
          type: integer
        unrecalled:
          type: integer
        by_subject:
          type: array
          items:
            type: object
            properties:
              subject_id:
                type: integer
              subject_name:
                type: string
              count:
                type: integer
              unrecalled:
                type: integer
        by_error_type:
          type: object
          additionalProperties:
            type: integer

    PaginatedErrors:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ErrorBookItem"

    # ---------- 知识点状态 ----------

    KnowledgeStatus:
      type: object
      properties:
        knowledge_point_id:
          type: integer
        knowledge_point_name:
          type: string
        subject_name:
          type: string
        level:
          type: integer
          description: 层级（1-章/2-节/3-点）
        status:
          type: string
          enum: [未观察, 初步接触, 需要巩固, 基本掌握, 反复失误]
        importance_score:
          type: number
          format: float
          description: 归一化重要性分（0.0-1.0）
        last_updated_at:
          type: string
          format: date-time
        is_manual_corrected:
          type: boolean

    # ---------- 周报 ----------

    WeeklyReportStudent:
      type: object
      properties:
        report_week:
          type: string
          example: "2026-W11"
        usage_days:
          type: integer
        total_minutes:
          type: integer
        task_completion_rate:
          type: number
          format: float
          description: 任务完成率（0-1）
        subject_trends:
          type: array
          items:
            type: object
            properties:
              subject_name:
                type: string
              risk_level:
                type: string
                enum: [稳定, 轻度风险, 中度风险, 高风险]
              trend:
                type: string
                enum: [improving, stable, declining]
        high_risk_knowledge_points:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              subject_name:
                type: string
              status:
                type: string
        repeated_error_points:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              error_count:
                type: integer
        next_stage_suggestions:
          type: array
          items:
            type: string
        class_rank:
          type: integer
          nullable: true
        grade_rank:
          type: integer
          nullable: true
        share_token:
          type: string
          nullable: true
          description: 已生成的分享 Token（如有）

    WeeklyReportParent:
      type: object
      description: 家长视角周报，不含具体错题内容和完整问答记录
      properties:
        report_week:
          type: string
        student_name:
          type: string
          description: 学生昵称
        usage_days:
          type: integer
        total_minutes:
          type: integer
        task_completion_rate:
          type: number
          format: float
        subject_risks:
          type: array
          items:
            $ref: "#/components/schemas/SubjectRisk"
        trend_description:
          type: string
          description: 整体进步/退步的文字描述
        action_suggestions:
          type: array
          items:
            type: string
          description: 针对家长的行动建议
        class_rank:
          type: integer
          nullable: true
        grade_rank:
          type: integer
          nullable: true
        share_token:
          type: string
          nullable: true

    StageReportParent:
      type: object
      properties:
        weeks_covered:
          type: integer
        start_week:
          type: string
        end_week:
          type: string
        overall_trend:
          type: string
          enum: [improving, stable, declining]
        subject_trends:
          type: array
          items:
            type: object
            properties:
              subject_name:
                type: string
              trend:
                type: string
              risk_change:
                type: string
                description: 风险变化描述

    SubjectRisk:
      type: object
      properties:
        subject_id:
          type: integer
        subject_name:
          type: string
        risk_level:
          type: string
          enum: [稳定, 轻度风险, 中度风险, 高风险]
        effective_week:
          type: string

    TrendData:
      type: object
      properties:
        weeks:
          type: array
          items:
            type: string
          description: 周列表（最近 N 周）
        subjects:
          type: array
          items:
            type: object
            properties:
              subject_name:
                type: string
              risk_levels:
                type: array
                items:
                  type: string
                description: 与 weeks 对应的每周风险等级

    ParentSupplementRequest:
      type: object
      properties:
        grade:
          type: string
          enum: [高一, 高二, 高三]
        subject_combination:
          type: array
          items:
            type: string

    ExamRecordRequest:
      type: object
      required: [exam_type, exam_date, subject_id, score]
      properties:
        exam_type:
          type: string
          enum: [月考, 期中, 期末, 周测]
        exam_date:
          type: string
          format: date
        subject_id:
          type: integer
        score:
          type: number
          minimum: 0
        full_score:
          type: number
          default: 100
        class_rank:
          type: integer
          nullable: true
        grade_rank:
          type: integer
          nullable: true

    ExamRecord:
      type: object
      properties:
        id:
          type: integer
        exam_type:
          type: string
        exam_date:
          type: string
          format: date
        subject_name:
          type: string
        score:
          type: number
        full_score:
          type: number
        score_rate:
          type: number
          description: 得分率（score / full_score）
        created_at:
          type: string
          format: date-time

    # ---------- 分享链接 ----------

    ShareContent:
      type: object
      description: 脱敏摘要数据，不含敏感字段
      properties:
        student_name:
          type: string
          description: 学生昵称（脱敏，如"小明"）
        report_week:
          type: string
        usage_days:
          type: integer
        total_minutes:
          type: integer
        trend_overview:
          type: string
          description: 进步/退步趋势概述
        subject_risk_overview:
          type: array
          items:
            type: object
            properties:
              subject_name:
                type: string
              risk_level:
                type: string
        next_stage_suggestions_summary:
          type: string
          description: 下阶段建议摘要
        expires_at:
          type: string
          format: date-time

    # ---------- 管理端 — 纠偏 ----------

    CorrectionItem:
      type: object
      properties:
        id:
          type: integer
        target_type:
          type: string
          enum: [ocr, knowledge, plan, qa]
        target_id:
          type: integer
        original_content:
          type: object
          nullable: true
        corrected_content:
          type: object
        correction_reason:
          type: string
          nullable: true
        corrected_by:
          type: integer
        created_at:
          type: string
          format: date-time

    CorrectionResult:
      type: object
      properties:
        correction_id:
          type: integer
        target_type:
          type: string
        target_id:
          type: integer
        success:
          type: boolean
        message:
          type: string

    PaginatedCorrections:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  target_type:
                    type: string
                  target_id:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  status:
                    type: string
                    enum: [pending, resolved]

    PaginatedCorrectionLogs:
      allOf:
        - $ref: "#/components/schemas/Pagination"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CorrectionItem"

    # ---------- 管理端 — 监控 ----------

    TodayMetrics:
      type: object
      properties:
        date:
          type: string
          format: date
        active_users:
          type: integer
        plans_generated:
          type: integer
        uploads_count:
          type: integer
        qa_sessions:
          type: integer
        total_api_requests:
          type: integer
        api_error_rate:
          type: number
          format: float
        current_mode:
          type: string
          enum: [normal, best]
        estimated_cost_today:
          type: number
          description: 今日估算成本（元）
        pending_corrections:
          type: integer
          description: 待处理纠偏队列长度

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        components:
          type: object
          properties:
            database:
              type: string
              enum: [ok, error]
            redis:
              type: string
              enum: [ok, error]
            celery_worker:
              type: string
              enum: [ok, error]
            oss:
              type: string
              enum: [ok, error]

    ModelCallStats:
      type: object
      properties:
        date:
          type: string
          format: date
        by_agent:
          type: array
          items:
            type: object
            properties:
              agent_name:
                type: string
              total_calls:
                type: integer
              success_calls:
                type: integer
              fallback_calls:
                type: integer
              avg_latency_ms:
                type: integer
              p95_latency_ms:
                type: integer
              total_input_tokens:
                type: integer
              total_output_tokens:
                type: integer
              estimated_cost:
                type: number

    CostStats:
      type: object
      properties:
        days:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              cost_normal_mode:
                type: number
              cost_best_mode:
                type: number
              total_cost:
                type: number
        total_cost:
          type: number
        daily_average:
          type: number

    ErrorStats:
      type: object
      properties:
        date:
          type: string
          format: date
        total_errors:
          type: integer
        api_errors:
          type: integer
        ocr_failures:
          type: integer
        llm_errors:
          type: integer
        by_type:
          type: object
          additionalProperties:
            type: integer

    FallbackStats:
      type: object
      properties:
        date:
          type: string
          format: date
        total_fallbacks:
          type: integer
        fallback_rate:
          type: number
          format: float
        by_agent:
          type: object
          additionalProperties:
            type: integer

    LatencyStats:
      type: object
      properties:
        date:
          type: string
          format: date
        overall:
          type: object
          properties:
            p50_ms:
              type: integer
            p95_ms:
              type: integer
            p99_ms:
              type: integer
        by_agent:
          type: array
          items:
            type: object
            properties:
              agent_name:
                type: string
              p50_ms:
                type: integer
              p95_ms:
                type: integer
              p99_ms:
                type: integer
