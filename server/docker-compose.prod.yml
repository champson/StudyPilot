services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-studypilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-studypilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-studypilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-studypilot}:${DB_PASSWORD}@db:5432/${DB_NAME:-studypilot}
      REDIS_URL: redis://redis:6379/0
      WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.tasks.celery_app:celery worker -l info -c 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-studypilot}:${DB_PASSWORD}@db:5432/${DB_NAME:-studypilot}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.tasks.celery_app:celery beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-studypilot}:${DB_PASSWORD}@db:5432/${DB_NAME:-studypilot}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
