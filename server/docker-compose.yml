services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: studypilot
      POSTGRES_PASSWORD: studypilot
      POSTGRES_DB: studypilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studypilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://studypilot:studypilot@db:5432/studypilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app:celery worker -l info
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://studypilot:studypilot@db:5432/studypilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app:celery beat -l info
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://studypilot:studypilot@db:5432/studypilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
